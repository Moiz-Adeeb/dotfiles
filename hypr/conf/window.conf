$mainMod = SUPER
$left = h
$right = l
$up = k
$down = j

# Move focus around with mainMod + arrow keys or $left/$down etc.
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# If you have $left, $down, etc. defined as variables (HJKL):
bind = $mainMod, $left, movefocus, l
bind = $mainMod, $down, movefocus, d
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $right, movefocus, r

# Move the focused window with mainMod + Shift + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move window with variables (HJKL):
bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $down, movewindow, d
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $right, movewindow, r


# Horizontal and Vertical Splits
bind = $mainMod, B, togglesplit,
bind = $mainMod, B, togglesplit,

# Layout Styles (Stacking/Tabbed)
bind = $mainMod, W, togglegroup,     # "Tabbed" mode
bind = $mainMod, S, togglegroup,     # Closest equivalent to stacking
bind = $mainMod SHIFT, E, togglesplit, # Toggles the split direction

# Fullscreen
bind = $mainMod, F, fullscreen, 0    # 0 = True fullscreen, 1 = Maximize (keep bar)

# Floating
bind = $mainMod, space, togglefloating, 
bind = $mainMod SHIFT, space, focuscurrentorlast, # Swaps between tiling and floating focus

# Focus Next (Alt+Tab)
bind = ALT, Tab, movefocus, r

# Move focused window to scratchpad
bind = $mainMod SHIFT, minus, movetoworkspace, special

# Show/hide the scratchpad
bind = $mainMod, minus, togglespecialworkspace,

# Switch to resize mode
bind = $mainMod, R, submap, resize

# Start the resize submap
submap = resize

# Use HJKL or variables to resize
binde = , $left,  resizeactive, -10 0
binde = , $down,  resizeactive, 0 10
binde = , $up,    resizeactive, 0 -10
binde = , $right, resizeactive, 10 0

# Use Arrow keys to resize
binde = , Left,  resizeactive, -10 0
binde = , Down,  resizeactive, 0 10
binde = , Up,    resizeactive, 0 -10
binde = , Right, resizeactive, 10 0

# Exit resize mode (Return, Escape, or $mod+r)
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mainMod, R, submap, reset

# Reset submap to default
submap = reset




