# Make sure your terminal variable uses the client
bind = ALT, Period, exec, uwsm app -- $terminal -e nvim ~/.config/
bind = $mainMod, Return, exec, uwsm app -- $terminal -a float_small
bind = $mainMod CTRL, Return, exec, uwsm app -- $terminal -a float_large
bind = $mainMod SHIFT, Return, exec, uwsm app -- $terminal
bind = $mainMod, X, killactive,
bind = $mainMod SHIFT, L, exec, uwsm app -- hyprlock
bind = $mainMod CTRL, L, exec, uwsm stop
bind = $mainMod, E, exec, uwsm app -- $terminal -a float_large -e yazi
bind = $mainMod SHIFT, E, exec, uwsm app -- thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, uwsm app -- $menu
bind = ALT, Space, exec, uwsm app -- $menu
bind = $mainMod, P, exec, uwsm app -- $powermenu
#bind = $mainMod, B, exec, uwsm app -- sh -c "systemctl --user stop waybar || systemctl --user start waybar"
bind = $mainMod, B, exec, sh -c "systemctl --user is-active waybar && systemctl --user stop waybar || systemctl --user start waybar"
bind = $mainMod, ESCAPE, exec, uwsm app -- $terminal -a float_large -e btop
bind = $mainMod, F10, exec, uwsm app -- ~/.config/hypr/scripts/monitors.sh
bind = $mainMod SHIFT, P, pseudo, 
#bind = $mainMod SHIFT, E, togglesplit, 
bind = $mainMod, Z, layoutmsg, preselect d
bind = $mainMod, C, layoutmsg, preselect r
bind = $mainMod SHIFT, I, exec, uwsm app -- $terminal -a float_small -e ~/.cargo/bin/impala-nm
bind = $mainMod SHIFT, W, exec, uwsm app -- $terminal -a float_small -e wiremix
bind = $mainMod SHIFT, M, exec, uwsm app -- $terminal -a float_small -e ~/.cargo/bin/bluetui
bind = $mainMod SHIFT, B, exec, uwsm app -- systemctl --user restart waybar
 bind = , Print, exec, uwsm app -- hyprshot -m region
#bind = , Print, exec, sh -c "uwsm app -- hyprshot -m region"

# Restarting foot server under systemd instead of raw pkill
bind = $mainMod SHIFT, Z, exec, systemctl --user restart foot-server

bind = $mainMod SHIFT, G, exec, uwsm app -- ~/.config/hypr/scripts/background_swap.sh
bind = $mainMod CTRL, G, exec, uwsm app -- ~/.config/hypr/scripts/background_swap_prev.sh
bind = $mainMod SHIFT, N, exec, uwsm app -- dunstctl history-pop


# Volume Control
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind  = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness Control
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5% && busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d 0.05
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d -0.05

# Media Player Control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous



# Clipboard Manager (requires cliphist and rofi)
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Reload Config (Native Hyprland)
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Exit Hyprland (Direct exit to save RAM, skip swaynag)
bind = $mainMod CTRL, E, exit

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


#Scrolling Layout

# Navigate between columns
bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col

# Move windows between columns
bind = $mainMod SHIFT, period, layoutmsg, movewindowto r
bind = $mainMod SHIFT, comma, layoutmsg, movewindowto l
bind = $mainMod SHIFT, up, layoutmsg, movewindowto u
bind = $mainMod SHIFT, down, layoutmsg, movewindowto d

# Resize column - fullscreen and back
bind = $mainMod, A, layoutmsg, colresize 1.0
bind = $mainMod SHIFT, E, layoutmsg, colresize 0.5

# bind = $mainMod SHIFT, E, layoutmsg, colresize +conf

# Cycle through preset widths
bind = $mainMod CTRL, right, layoutmsg, colresize +conf
bind = $mainMod CTRL, left, layoutmsg, colresize -conf

# Promote window to its own column
bind = $mainMod, U, layoutmsg, promote

# Toggle overview
#bind = $mainMod, O, hyprexpo:expo, toggle

