$terminal = footclient
$menu = rofi -show drun
$powermenu = ~/.config/rofi/powermenu/powermenu.sh
$mainMod = SUPER

# blurls = waybar

# # Apply blur directly to the Waybar layer surface
# layerrule = blur, waybar
#
# # Optional: Ignore zero alpha pixels so corners look sharp
# layerrule = ignorezero, waybar
#
#
#
# # Show Waybar when pressing Super (bindt ignores shortcut conflicts)
# bindt = , Super_L, exec, pkill -SIGUSR1 waybar
#
# # Hide Waybar when releasing Super (bindrt catches the release seamlessly)
# bindrt = SUPER, Super_L, exec, pkill -SIGUSR1 waybar


# Applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, X, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $terminal -a float_large -e ~/.cargo/bin/yazi
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, exec, $powermenu
bind = $mainMod, ESCAPE, exec, $terminal -a float_large -e btop
bind = $mainMod, F10, exec, ~/.config/hypr/scripts/monitors.sh
bind = $mainMod SHIFT, P, pseudo, 
bind = $mainMod SHIFT, E, togglesplit, 
bind = $mainMod SHIFT, I, exec, $terminal -a float_small -e ~/.cargo/bin/impala-nm
bind = $mainMod SHIFT, W, exec, $terminal -a float_small -e wiremix
bind = $mainMod SHIFT, M, exec, $terminal -a float_small -e ~/.cargo/bin/bluetui
bind = $mainMod SHIFT, B, exec, pkill waybar || waybar
bind = $mainMod SHIFT, Z, exec, pkill foot && foot --server
bind = $mainMod SHIFT, G, exec, ~/.config/sway/scripts/background-swap.sh
bind = $mainMod SHIFT, N, exec, dunstctl history-pop

# Volume Control
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind  = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind  = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness Control
binde = , XF86MonBrightnessUp, exec, brightnessctl set +10% && busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d 0.1
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%- && busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d -0.1

# Media Player Control
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous



# Clipboard Manager (requires cliphist and rofi)
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Reload Config (Native Hyprland)
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Exit Hyprland (Direct exit to save RAM, skip swaynag)
bind = $mainMod CTRL, E, exit

bind = $mainMod SHIFT, R, exec, hyprctl reload

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
