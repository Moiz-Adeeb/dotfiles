general {
    gaps_in = 4
    gaps_out = 10

    border_size = 3

    col.active_border = rgba(33ccffdd) rgba(00ff99dd) 45deg
    #col.inactive_border = rgba(bb9af7aa) rgba(c6a0f6aa) 45deg
    col.inactive_border = rgba(00000000)

    resize_on_border = false
    allow_tearing = true

    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 2
    active_opacity = 1
    inactive_opacity = 1
    shadow {
        enabled = false
    }
    blur {
        enabled = false
        size = 4
        passes = 0
        ignore_opacity = false
        new_optimizations = true
        xray =  false
    }
    dim_inactive = false
    dim_strength = 0.05
}

animations {
    enabled = false

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     0.79,  easeOutQuint
    animation = windowsIn,     1,     1.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.13,  almostLinear
    animation = fadeOut,       1,     1.13,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     0.75,  almostLinear, fade
    animation = workspacesOut, 1,     1.25,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}
dwindle {
    #pseudotile = true
    preserve_split = false
    force_split = 2
}

master {
    #new_status = master
    new_status = slave
    mfact = 0.55
}
