# Don't print a new line at the start of the prompt
add_newline = true
# Pipes ╰─ ╭─
# Powerline symbols                                     
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:#000000'

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ ](bold fg:#a6da95)"
error_symbol = "[ ](bold fg:#ea6962)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = false

[git_branch]
style = "bg: #f5a97f"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = " 󰜥 (bold fg:#f5a97f)[ $symbol $branch(:$remote_branch) ](fg:#1d2021 bg:#f5a97f)(bold fg:#f5a97f)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[•$hostname ](bg:#f5a97f bold fg:#1d2021)(bold fg:#f5a97f)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = true

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#f5a97f fg:#1d2021"
style_root = "red bold"
format = "(bold fg:#f5a97f)[ $user ]($style)"
disabled = false
show_always = true

[directory]
home_symbol = " "
read_only = "  "
style = "bg:#91d7e3 fg:240"
truncation_length = 2
truncation_symbol = ".../"
format = '(bold bg:#91d7e3)[ 󰉋 → $path ](bg:#91d7e3 fg:#000000)($style)(bold bg:#91d7e3)'


[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '(bold fg:#f5a97f)[ 󰪢 $duration ](bg:#f5a97f fg:#000000)(bold fg:#f5a97f)'
