# vim: filetype=swayconfig

xwayland disable


#------------------
# Setting Variables
#------------------


set $mod Mod4

set $left h
set $down j
set $up k
set $right l

set $term footclient

set $rofi_cmd rofi \
        -terminal '$term'

set $powermenu $HOME/.config/rofi/powermenu/powermenu.sh

 set $menu $rofi_cmd -show drun -replace
#set $menu $HOME/.config/rofi/launchers/launcher.sh

set $gnome-schema org.gnome.desktop.interface


#-------
# Basics
#-------


# Lock Screen
bindsym $mod+F1 exec ~/.config/sway/scripts/lockman.sh

# Restart foot sever
bindsym $mod+z exec pkill foot && foot --server

# Rotate output clockwise
bindsym $mod+F9 output eDP-1 transform 0
bindsym $mod+Ctrl+F9 output eDP-1 transform 90
# Rotate output anticlockwise
bindsym $mod+Shift+F9 output eDP-1 transform 180
# Toggle laptop screen on/off with Mod+F10
bindsym $mod+F10 output eDP-1 toggle

# Toggle between wallpapers
bindsym $mod+Shift+g exec ~/.config/sway/scripts/background-swap.sh

# Toggle Waybar: kills it if running, starts it if not
bindsym $mod+Shift+b exec "pkill waybar || waybar" 

# Toggle background waybar
bindsym $mod+Ctrl+w exec ~/.config/waybar/scripts/swap.sh

# Start a terminal
bindsym $mod+Return exec $term

# Kill focused window
bindsym $mod+Shift+q kill
bindsym $mod+x kill

#screenshot utility
bindsym Print exec grim -g "$(slurp)" - | wl-copy

# Power menu
bindsym $mod+p exec $powermenu

bindsym $mod+Shift+p exec rofi -show window

# Use pactl to adjust volume in PulseAudio.
set $refresh_i3status killall -SIGUSR1 i3status
bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +10% && $refresh_i3status
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -10% && $refresh_i3status
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle && $refresh_i3status
bindsym XF86AudioMicMute exec --no-startup-id pactl set-source-mute @DEFAULT_SOURCE@ toggle && $refresh_i3status

# Binds for brightness
bindsym XF86MonBrightnessUp exec "brightnessctl set +10% && busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d 0.1"
bindsym XF86MonBrightnessDown exec "brightnessctl set 10%- && busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateBrightness d -0.1"

# Clipboard manager
bindsym $mod+Shift+v exec "cliphist list | rofi -dmenu  | cliphist decode | wl-copy && wtype -M ctrl -M shift -k v -m ctrl -m shift"

# Drag floating windows by holding down $mod and left mouse button.
# mouse button for dragging.
floating_modifier $mod normal

# Reload the configuration file
bindsym $mod+Shift+r reload

# Exit sway (logs you out of your Wayland session)
bindsym $mod+Ctrl+e exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -B 'Yes, exit sway' 'swaymsg exit'


#--------------
# Moving around
#--------------


# Move your focus around
bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Move the focused window with the same, but add Shift
bindsym $mod+Shift+$left move left
bindsym $mod+Shift+$down move down
bindsym $mod+Shift+$up move up
bindsym $mod+Shift+$right move right

bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right


#-----------
# Workspaces
#-----------


# Switch to workspace
bindsym $mod+1 workspace number 01
bindsym $mod+2 workspace number 02
bindsym $mod+3 workspace number 03
bindsym $mod+4 workspace number 04
bindsym $mod+5 workspace number 05
bindsym $mod+6 workspace number 06
bindsym $mod+7 workspace number 07
bindsym $mod+8 workspace number 08
bindsym $mod+9 workspace number 09
bindsym $mod+0 workspace number 10

# Jump to the next available workspace (Highest + 1)
#bindsym $mod+t exec swaymsg workspace number $(( $(swaymsg -t get_workspaces | jq '[.[] | .num] | max') + 1 ))
bindsym $mod+t exec "NEXT_WS=$(printf '%02d' $(( $(swaymsg -t get_workspaces | jq 'map(.num) | max') + 1 ))); swaymsg workspace number $NEXT_WS"

# Cycle Tab
bindsym $mod+Tab workspace next
bindsym $mod+Shift+Tab workspace prev

# Move focused container to workspace
bindsym $mod+Shift+1 move container to workspace number 01; workspace number 01
bindsym $mod+Shift+2 move container to workspace number 02; workspace number 02
bindsym $mod+Shift+3 move container to workspace number 03; workspace number 03
bindsym $mod+Shift+4 move container to workspace number 04; workspace number 04
bindsym $mod+Shift+5 move container to workspace number 05; workspace number 05
bindsym $mod+Shift+6 move container to workspace number 06; workspace number 06
bindsym $mod+Shift+7 move container to workspace number 07; workspace number 07
bindsym $mod+Shift+8 move container to workspace number 08; workspace number 08
bindsym $mod+Shift+9 move container to workspace number 09; workspace number 09
bindsym $mod+Shift+0 move container to workspace number 10; workspace number 10

# Move focused container to the next available workspace (Highest + 1)
# bindsym $mod+Shift+t exec bash -c 'NEW_WS=$(( $(swaymsg -t get_workspaces | jq "[.[] | .num] | max // 0") + 1 )); swaymsg move container to workspace number $NEW_WS; swaymsg workspace number $NEW_WS'

bindsym $mod+Shift+t exec "NEXT_WS=$(printf '%02d' $(( $(swaymsg -t get_workspaces | jq 'map(.num) | max') + 1 ))); swaymsg move container to workspace number $NEXT_WS; swaymsg workspace number $NEXT_WS"


# $mod+b or $mod+v, for horizontal and vertical splits
bindsym $mod+b splith
bindsym $mod+v splitv

# Switch the current container between different layout styles
bindsym $mod+s layout stacking
bindsym $mod+w layout tabbed
bindsym $mod+Shift+e layout toggle split

# Make the current focus fullscreen
bindsym $mod+f fullscreen

# Toggle the current focus between tiling and floating mode
bindsym $mod+space floating toggle

# Swap focus between the tiling area and the floating area
bindsym $mod+Shift+space focus mode_toggle

# Move focus to the parent container
bindsym $mod+a focus parent

bindsym Mod1+Tab focus next


#-----------
# Scratchpad
#-----------


# Move the currently focused window to the scratchpad
bindsym $mod+Shift+minus move scratchpad

# Show the next scratchpad window or hide the focused scratchpad window.
bindsym $mod+minus scratchpad show

mode "resize" {
        bindsym $left resize shrink width 10px
        bindsym $down resize grow height 10px
        bindsym $up resize shrink height 10px
        bindsym $right resize grow width 10px

        bindsym Left resize shrink width 10px
        bindsym Down resize grow height 10px
        bindsym Up resize shrink height 10px
        bindsym Right resize grow width 10px

        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym $mod+r mode "default"
}
bindsym $mod+r mode "resize"


#--------------
# App shortcuts
#--------------


# Start your launcher
bindsym $mod+d exec $menu

# browser
bindsym $mod+o exec brave-browser


