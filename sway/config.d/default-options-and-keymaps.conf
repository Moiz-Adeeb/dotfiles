#--------------
# Foot Terminal
#--------------


# yazi File Manager TUI
bindsym $mod+e exec $term -a float_large -e ~/.cargo/bin/yazi

# imapal-nm TUI for WIFI
bindsym $mod+Shift+i exec $term -a float_small  -e ~/.cargo/bin/impala-nm

# wiremix TUI for volume
bindsym $mod+Shift+w exec $term -a float_small -e wiremix

# bluetui TUI for volume
bindsym $mod+Shift+m exec $term -a float_small -e ~/.cargo/bin/bluetui

# btop TUI for system resources
bindsym $mod+Escape exec $term -a float_large -e btop

