# vim: filetype=swayconfig

include colors

# # Rounded Corners
# smart_corner_radius off
# corner_radius 0
#
# # Window Shadows
# shadows off
# shadow_blur_radius 0
# shadow_color #0000007f
#
# # Blur (Visible on transparent windows/bars)
# blur off
# blur_xray off
# blur_passes 2
# blur_radius 0


# Set inner/outer gaps
gaps inner 0
gaps outer 0

# Hide titlebar on windows: 
default_border pixel 2
default_floating_border pixel 2

# disable focus follows mouse
focus_follows_mouse no

# Thin borders:
smart_borders on
hide_edge_borders none
popup_during_fullscreen smart

title_align center


# Title format for windows
#for_window [shell="xdg_shell"] title_format "%title (%app_id)"
#for_window [shell="x_wayland"] title_format "%class - %title"

set $opacity 1

# for_window [class=".*"] opacity $opacity
# for_window [app_id=".*"] opacity $opacity

#----------------#
# set gtk+ theme #
#----------------#
    set $gnome-schema org.gnome.desktop.interface
    exec_always {
        gsettings set $gnome-schema gtk-theme 'Adwaita'
        gsettings set $gnome-schema color-scheme 'prefer-dark'
        gsettings set $gnome-schema cursor-theme 'volantes_cursors'
    }


# Window decorations:    border,   background,  text,     indicator, child-border
client.focused           $blue     $base        $text      $blue      $blue
client.focused_inactive  $magenta  $base        $text      $mantle    $magenta
client.unfocused         $magenta  $base        $text      $mantle    $magenta
client.urgent            $peach    $base        $peach     $overlay0  $peach
client.placeholder       $base     $base        $text      $overlay0  $overlay0
client.background        $base
