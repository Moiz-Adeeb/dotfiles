$mainMod = SUPER
$left = h
$right = l
$up = k
$down = j

# Move focus around with mainMod + arrow keys or $left/$down etc.
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# If you have $left, $down, etc. defined as variables (HJKL):
bind = $mainMod, $left, movefocus, l
bind = $mainMod, $down, movefocus, d
bind = $mainMod, $up, movefocus, u
bind = $mainMod, $right, movefocus, r

# Move the focused window with mainMod + Shift + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move window with variables (HJKL):
bind = $mainMod SHIFT, $left, movewindow, l
bind = $mainMod SHIFT, $down, movewindow, d
bind = $mainMod SHIFT, $up, movewindow, u
bind = $mainMod SHIFT, $right, movewindow, r


# Horizontal and Vertical Splits
bind = $mainMod, B, togglesplit, 
bind = $mainMod, V, togglesplit, 

# Layout Styles (Stacking/Tabbed)
bind = $mainMod, W, togglegroup,
bind = $mainMod, S, togglegroup,
bind = $mainMod SHIFT, E, togglesplit,

# Fullscreen
bind = $mainMod, F, fullscreen, 0

# Floating
bind = $mainMod, space, togglefloating, 
bind = $mainMod SHIFT, space, focuscurrentorlast,

# Focus Next (Alt+Tab)
bind = ALT, Tab, movefocus, r

# Resize submap
bind = $mainMod, R, submap, resize

submap = resize

# Resize with HJKL
binde = , $right, resizeactive, 20 0
binde = , $left, resizeactive, -20 0
binde = , $up, resizeactive, 0 -20
binde = , $down, resizeactive, 0 20

# Resize with arrow keys
binde = , right, resizeactive, 20 0
binde = , left, resizeactive, -20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20

# Exit resize submap
bind = , escape, submap, reset
bind = $mainMod, R, submap, reset

submap = reset
