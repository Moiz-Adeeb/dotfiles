# Minimalist Foot Configuration
[main]
font=JetBrains Mono:size=12
#font=FiraCode Nerd Font:size=12
pad=5x5
shell=uwsm app -- /usr/bin/fish --login
dpi-aware=no
initial-window-mode=windowed


[scrollback]
lines=2000
multiplier=5.0


[cursor]
style=block
blink=no


[mouse]
hide-when-typing=yes


[colors]
alpha=1
background=24273A
#000000
foreground=c0caf5

## Normal colors
regular0=24283b  # black
regular1=f7768e  # red
regular2=9ece6a  # green
regular3=e0af68  # yellow
regular4=7aa2f7  # blue
regular5=bb9af7  # magenta
regular6=7dcfff  # cyan
regular7=787c99  # white

## Bright colors
bright0=414868   # bright black
bright1=ff9ead   # bright red
bright2=b9f27c   # bright green
bright3=ffc777   # bright yellow
bright4=bcdaff   # bright blue
bright5=c3a5fa   # bright magenta
bright6=0db9d7   # bright cyan
bright7=acb0d0   # bright white


[key-bindings]
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0
