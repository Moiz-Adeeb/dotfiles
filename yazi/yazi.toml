[mgr]
ratio = [2, 5, 4]
show_hidden = false
show_symlink = true
sort_by = "natural"
sort_sensitive = false
sort_dir_first = true
mouse_events = ["click", "scroll"]
scrolloff = 10
linemode = "size"


[open]
rules = [
  # 1. Folders first
  { name = "*/", use = ["enter"] },

  # 2. Specific types (Move text here)
  { mime = "text/*", use = ["edit", "open"] },
  { mime = "image/*", use = ["open"] },
  { mime = "video/*", use = ["open"] },
  { mime = "application/pdf", use = ["open"] },
  { mime = "application/vnd.openxmlformats-officedocument*", use = ["open"] },
  { mime = "document/*", use = ["edit", "open"] },
  # 3. Catch-alls at the very bottom
  { mime = "*/*", use = ["open"] },
  { name = "*", use = ["open"] },
]

[opener]
edit = [
  { run = 'nvim "$@"', block = true, desc = "Neovim", for = "unix" },
  { run = '$EDITOR "$@"', block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$1"', desc = "Open", orphan = true, for = "linux" }
]
copy-content = [
    { run = 'cat "$1" | xclip -sel clipboard', for = "linux" }
]

[filetype]
rules = [
    { name = "*", is = "hidden", fg = "cyan" },
]   

[preview]
image_quality = 90
max_width = 3000
max_height = 2000
